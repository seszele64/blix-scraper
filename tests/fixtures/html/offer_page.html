<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferty - Gazetka Biedronka - Blix.pl</title>
</head>
<body>
    <main>
        <div class="offers-container">
            <article class="offer-item" data-offer-id="123456">
                <div class="offer-item__image">
                    <img src="https://imgproxy.blix.pl/image/offer/123456/product.jpg"
                         alt="Chleb żytni"
                         class="offer-item__product-image" />
                </div>
                <div class="offer-item__details">
                    <h3 class="offer-item__name">Chleb żytni 500g</h3>
                    <div class="offer-item__price">
                        <span class="offer-item__price-value">4,99</span>

                        <span class="offer-item__price-unit">/szt.</span>
                    </div>
                    <div class="offer-item__old-price">
                        <span class="offer-item__old-price-value">6,99</span>
                        <span class="offer-item__old-price-currency">zł</span>
                    </div>
                    <div class="offer-item__discount">
                        <span class="offer-item__discount-value">-29%</span>
                    </div>
                    <div class="offer-item__validity">
                        <span class="offer-item__validity-text">Oferta ważna od 29.10 do 05.11.2025</span>
                    </div>
                </div>
            </article>
            <article class="offer-item" data-offer-id="123457">
                <div class="offer-item__image">

                         alt="Mleko 3,2% 1l"
                         class="offer-item__product-image" />
                </div>
                <div class="offer-item__details">
                    <h3 class="offer-item__name">Mleko UHT 3,2% 1l</h3>
                    <div class="offer-item__price">
                        <span class="offer-item__price-value">3,49</span>
                        <span class="offer-item__price-currency">zł</span>
                        <span class="offer-item__price-unit">/szt.</span>
                    </div>
                    <div class="offer-item__old-price">
                        <span class="offer-item__old-price-value">4,29</span>
                        <span class="offer-item__old-price-currency">zł</span>
                    </div>
                    <div class="offer-item__discount">
                        <span class="offer-item__discount-value">-19%</span>
                    </div>
                    <div class="offer-item__validity">
                        <span class="offer-item__validity-text">Oferta ważna od 29.10 do 05.11.2025</span>
                    </div>
                </div>
            </article>
            <article class="offer-item" data-offer-id="123458">
                <div class="offer-item__image">
                    <img src="https://imgproxy.blix.pl/image/offer/123458/product.jpg"

                         class="offer-item__product-image" />

                <div class="offer-item__details">
                    <h3 class="offer-item__name">Jajka klasa L 10 szt.</h3>
                    <div class="offer-item__price">

                        <span class="offer-item__price-unit">/opak.</span>
                    </div>
                    <div class="offer-item__validity">
                        <span class="offer-item__validity-text">Oferta ważna od 29.10 do 05.11.2025</span>
                    </div>
                </div>
