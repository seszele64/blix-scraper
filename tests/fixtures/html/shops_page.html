<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklepy - Blix.pl</title>
</head>
<body>

        <section class="section-n__items--brands">
            <a href="/sklep/biedronka/" title="Biedronka">

                </div>
            </a>
            <a href="/sklep/kaufland/" title="Kaufland">

                </div>
            </a>
            <a href="/sklep/lidl/" title="Lidl">

                    <img class="brand__logo" src="https://img.blix.pl/brand/67.jpg" alt="Lidl" />
                    <span class="brand__name">Lidl</span>
                </div>
            </a>
            <a href="/sklep/aldi/" title="Aldi">
                <div class="brand section-n__item">
                    <img class="brand__logo" src="https://img.blix.pl/brand/89.jpg" alt="Aldi" />
